<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppression boîte — Vola Kits</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
    --bg:#0a0b0f; --bg-elevated:#0f1117;
    --panel:#15171e; --panel-hover:#1a1d26;
    --border:#242832; --border-strong:#323847;
    --accent:#4ade80; --accent-grad:linear-gradient(135deg,#4ade80,#22d3ee); --accent-dim:rgba(74,222,128,.12);
    --text:#f1f3f6; --text-dim:#8b93a3; --text-faint:#5b6373;
    --danger:#f87171; --danger-dim:rgba(248,113,113,.12);
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 4px 12px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.3);
    --shadow-glow:0 0 0 1px rgba(74,222,128,.15),0 4px 16px rgba(74,222,128,.08);
}
:root[data-theme="light"]{
    --bg:#f7f8fa; --bg-elevated:#ffffff;
    --panel:#ffffff; --panel-hover:#f9fafb;
    --border:#e5e7eb; --border-strong:#d1d5db;
    --accent:#16a34a; --accent-grad:linear-gradient(135deg,#16a34a,#0891b2); --accent-dim:rgba(22,163,74,.08);
    --text:#0f172a; --text-dim:#64748b; --text-faint:#94a3b8;
    --danger:#dc2626; --danger-dim:rgba(220,38,38,.08);
    --shadow-sm:0 1px 2px rgba(15,23,42,.06);
    --shadow-md:0 4px 12px rgba(15,23,42,.08),0 1px 3px rgba(15,23,42,.06);
    --shadow-glow:0 0 0 1px rgba(22,163,74,.12),0 4px 16px rgba(22,163,74,.06);
}
*{box-sizing:border-box}
::selection{background:var(--accent);color:#0a0b0f}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 24px;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.card{animation:fadeInUp .35s cubic-bezier(.16,1,.3,1) both}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
h1{font-size:24px;margin:0;font-weight:800;letter-spacing:-0.02em}
.nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
@media(max-width:640px){
    .topbar{flex-direction:column;align-items:stretch}
    .nav{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .nav::-webkit-scrollbar{display:none}
    .nav a,.theme-btn{flex-shrink:0}
}
.nav a{color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;transition:all .15s ease}
.nav a:hover{color:var(--text);background:var(--panel-hover)}
.theme-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:100px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:var(--shadow-sm);transition:all .15s ease}
.theme-btn:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.dropzone{border:1.5px dashed var(--border-strong);border-radius:14px;padding:44px;text-align:center;cursor:pointer;color:var(--text-dim);font-size:14px;transition:all .2s ease;background:var(--bg-elevated)}
.dropzone:hover{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}
.dropzone.drag{border-color:var(--accent);background:var(--accent-dim);transform:scale(1.005)}
input[type=file]{display:none}
.file-count{font-weight:700;color:var(--accent);font-size:13px;margin-top:10px}
.btn{padding:14px 28px;background:var(--accent-grad);color:#06170d;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;box-shadow:var(--shadow-glow);transition:all .18s cubic-bezier(.16,1,.3,1)}
.btn:hover:not(:disabled){transform:translateY(-1.5px);box-shadow:0 6px 20px rgba(74,222,128,.25),var(--shadow-glow)}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-zip{padding:12px 24px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;display:none;transition:all .15s ease}
.btn-zip:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.status{font-size:13px;color:var(--text-dim);margin-top:14px;font-weight:500}
.progress-bar{height:6px;background:var(--border);border-radius:100px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:var(--accent-grad);width:0%;transition:width .3s cubic-bezier(.4,0,.2,1);border-radius:100px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:24px}
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card-imgs{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.card-imgs img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.card-label{font-size:10px;color:var(--text-dim);padding:6px 8px;text-align:center;font-weight:500}
.card-status{font-size:11px;padding:7px 8px;text-align:center;font-weight:600}
.card-status.ok{color:var(--accent)}
.card-status.err{color:var(--danger)}
.card-status.loading{color:var(--text-dim)}
.card-ph{display:flex;align-items:center;justify-content:center;aspect-ratio:3/4;background:var(--bg-elevated)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.dl-btn{display:block;text-align:center;padding:8px;background:var(--bg-elevated);border-top:1px solid var(--border);color:var(--text);font-size:11px;text-decoration:none;cursor:pointer;font-weight:600;transition:color .15s ease}
.dl-btn:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <h1>🗑️ Suppression de la boîte</h1>
        <div class="nav">
            <a href="/">🎨 Générateur</a>
            <a href="/queue">📋 File d'attente</a>
            <a href="/scheduled">✅ Programmés</a>
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/calendar">📅 Calendrier</a>
            <a href="/stats">📈 Stats</a>
            <a href="/templates">🗂️ Templates</a>
            <button class="theme-btn" id="themeBtn">☀️</button>
        </div>
    </div>

    <div class="panel">
        <div class="dropzone" id="dropzone">
            📁 Clique ou dépose tes images ici (50-100 images max)
            <input type="file" id="fileInput" accept="image/*" multiple>
            <div class="file-count" id="fileCount"></div>
        </div>
        <button class="btn" id="startBtn" disabled>🚀 Supprimer la boîte sur toutes les images</button>
        <button class="btn-zip" id="zipBtn">📦 Télécharger toutes les images en ZIP</button>
        <div class="status" id="status"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="grid" id="grid"></div>
</div>

<script>
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'dark';
applyTheme(theme);
function applyTheme(t){theme=t;html.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('theme',t)}
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileCount = document.getElementById('fileCount');
const startBtn = document.getElementById('startBtn');
const zipBtn = document.getElementById('zipBtn');
const statusEl = document.getElementById('status');
const progressFill = document.getElementById('progressFill');
const grid = document.getElementById('grid');

let files = [];
let results = {};

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    setFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});
fileInput.addEventListener('change', e => { setFiles(Array.from(e.target.files)); e.target.value = ''; });

function setFiles(f) {
    files = f.slice(0, 100);
    fileCount.textContent = `${files.length} image(s) sélectionnée(s)`;
    startBtn.disabled = files.length === 0;
    grid.innerHTML = '';
    results = {};
    zipBtn.style.display = 'none';
}

startBtn.addEventListener('click', async () => {
    if (!files.length) return;
    startBtn.disabled = true;
    startBtn.textContent = 'En cours...';
    zipBtn.style.display = 'none';
    results = {};
    progressFill.style.width = '0%';

    // Créer les cartes placeholder
    grid.innerHTML = '';
    const origPreviews = await Promise.all(files.map(f => new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(f);
    })));

    files.forEach((f, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${i}`;
        card.innerHTML = `
            <div class="card-label">${f.name}</div>
            <div class="card-imgs">
                <img src="${origPreviews[i]}" alt="original">
                <div class="card-ph"><div class="spinner"></div></div>
            </div>
            <div class="card-status loading" id="status-${i}">⏳ En attente...</div>
        `;
        grid.appendChild(card);
    });

    // Traiter les images une par une (pour éviter de saturer l'API)
    let done = 0;
    for (let i = 0; i < files.length; i++) {
        statusEl.textContent = `Traitement de l'image ${i + 1} / ${files.length}...`;
        
        const formData = new FormData();
        formData.append('image', files[i]);

        const card = document.getElementById(`card-${i}`);
        const statusCard = document.getElementById(`status-${i}`);

        try {
            const res = await fetch('/api/remove_box', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.image) {
                const imgSrc = `data:image/png;base64,${data.image}`;
                results[i] = { src: imgSrc, name: files[i].name };
                card.innerHTML = `
                    <div class="card-label">${files[i].name}</div>
                    <div class="card-imgs">
                        <img src="${origPreviews[i]}" alt="original">
                        <img src="${imgSrc}" alt="résultat">
                    </div>
                    <div class="card-status ok">✅ Boîte supprimée</div>
                    <a class="dl-btn" href="${imgSrc}" download="${files[i].name}">⬇️ Télécharger</a>
                `;
            } else {
                card.innerHTML = `
                    <div class="card-label">${files[i].name}</div>
                    <div class="card-imgs">
                        <img src="${origPreviews[i]}" alt="original">
                        <div class="card-ph">❌</div>
                    </div>
                    <div class="card-status err">❌ ${data.error || 'Erreur'}</div>
                `;
            }
        } catch (e) {
            card.innerHTML = `
                <div class="card-label">${files[i].name}</div>
                <div class="card-imgs">
                    <img src="${origPreviews[i]}" alt="original">
                    <div class="card-ph">❌</div>
                </div>
                <div class="card-status err">❌ Erreur réseau</div>
            `;
        }

        done++;
        progressFill.style.width = `${Math.round(done / files.length * 100)}%`;
    }

    statusEl.textContent = `✅ ${Object.keys(results).length} / ${files.length} images traitées`;
    startBtn.disabled = false;
    startBtn.textContent = '🚀 Supprimer la boîte sur toutes les images';
    if (Object.keys(results).length > 0) zipBtn.style.display = 'inline-block';
});

zipBtn.addEventListener('click', async () => {
    zipBtn.disabled = true;
    zipBtn.textContent = '⏳ Préparation du ZIP...';
    const zip = new JSZip();
    for (const [idx, img] of Object.entries(results)) {
        zip.file(img.name, img.src.split(',')[1], { base64: true });
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `templates_sans_boite_${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    URL.revokeObjectURL(url);
    zipBtn.disabled = false;
    zipBtn.textContent = '📦 Télécharger toutes les images en ZIP';
});
</script>
</body>
</html>
