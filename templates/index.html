<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur de flocages - Bulk</title>
<style>
    :root {
        --bg: #0f1115;
        --panel: #1a1d24;
        --border: #2a2e37;
        --accent: #4ade80;
        --text: #e5e7eb;
        --text-dim: #9ca3af;
        --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
    }
    .wrap {
        max-width: 1200px;
        margin: 0 auto;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .subtitle { color: var(--text-dim); font-size: 13px; margin: 0 0 24px; }
    .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
    }
    .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
    }
    @media (max-width: 800px) { .grid2 { grid-template-columns: 1fr; } }
    label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-dim);
    }
    textarea {
        width: 100%;
        padding: 12px;
        background: #11141a;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 14px;
        font-family: monospace;
        min-height: 180px;
        resize: vertical;
    }
    .dropzone {
        border: 2px dashed var(--border);
        border-radius: 10px;
        padding: 24px;
        text-align: center;
        cursor: pointer;
        font-size: 14px;
        color: var(--text-dim);
        min-height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
        transition: border-color 0.2s;
    }
    .dropzone:hover, .dropzone.dragover { border-color: var(--accent); color: var(--text); }
    input[type="file"] { display: none; }
    .file-count { font-weight: 700; color: var(--accent); }
    button {
        padding: 14px 28px;
        background: var(--accent);
        color: #0f1115;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 16px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { color: var(--text-dim); font-size: 13px; margin-top: 12px; }
    .progress-bar {
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 12px;
    }
    .progress-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 0.3s;
    }
    .results {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
    }
    .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .card img {
        width: 100%;
        border-radius: 8px;
        background: #000;
    }
    .card-title {
        font-size: 13px;
        font-weight: 700;
    }
    .card-error {
        color: var(--danger);
        font-size: 12px;
        background: rgba(248,113,113,0.1);
        border: 1px solid rgba(248,113,113,0.3);
        border-radius: 6px;
        padding: 8px;
    }
    .card .download-btn {
        background: #11141a;
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        padding: 8px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        text-align: center;
    }
    .card .retry-btn {
        background: #11141a;
        border: 1px solid var(--border);
        color: var(--text-dim);
        padding: 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
    }
    .card-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 160px;
        background: #11141a;
        border-radius: 8px;
        color: var(--text-dim);
        font-size: 12px;
    }
    .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
    <h1>🎨 Générateur de flocages — mode bulk</h1>
    <p class="subtitle">
        1. Upload les images de maillots (dans l'ordre) &nbsp;·&nbsp;
        2. Colle la liste des flocages, une ligne par maillot, format <code>NOM/NUMERO</code>
    </p>

    <div class="panel">
        <div class="grid2">
            <div>
                <label>Images des maillots</label>
                <div class="dropzone" id="dropzone">
                    <span id="dropzone-text">Clique ou dépose les images ici (plusieurs fichiers possible)</span>
                    <span class="file-count" id="fileCount"></span>
                    <input type="file" id="imageInput" accept="image/*" multiple>
                </div>
            </div>
            <div>
                <label>Flocages (1 par ligne — NOM/NUMERO)</label>
                <textarea id="flockages" placeholder="PIERRE/2
LUCAS/7
THEO/10"></textarea>
            </div>
        </div>
        <button id="generateBtn">Lancer la génération</button>
        <div class="status" id="status"></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="results" id="results"></div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const imageInput = document.getElementById('imageInput');
const fileCount = document.getElementById('fileCount');
const flockagesEl = document.getElementById('flockages');
const generateBtn = document.getElementById('generateBtn');
const statusEl = document.getElementById('status');
const progressFill = document.getElementById('progressFill');
const resultsEl = document.getElementById('results');

let selectedFiles = [];

dropzone.addEventListener('click', () => imageInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    setFiles(Array.from(e.dataTransfer.files));
});
imageInput.addEventListener('change', (e) => setFiles(Array.from(e.target.files)));

function setFiles(files) {
    // tri par nom de fichier pour un ordre cohérent et prévisible
    files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
    selectedFiles = files;
    fileCount.textContent = files.length ? `${files.length} image(s) sélectionnée(s)` : '';
}

generateBtn.addEventListener('click', async () => {
    const lines = flockagesEl.value.split('\n').map(l => l.trim()).filter(Boolean);

    if (selectedFiles.length === 0) {
        alert("Sélectionne au moins une image.");
        return;
    }
    if (lines.length === 0) {
        alert("Renseigne au moins un flocage.");
        return;
    }
    if (lines.length !== selectedFiles.length) {
        alert(`Le nombre d'images (${selectedFiles.length}) ne correspond pas au nombre de lignes de flocage (${lines.length}).`);
        return;
    }

    generateBtn.disabled = true;
    generateBtn.textContent = "Génération en cours...";
    resultsEl.innerHTML = '';
    progressFill.style.width = '0%';

    // Créer les cards placeholder dans l'ordre
    for (let i = 0; i < selectedFiles.length; i++) {
        const [name, number] = lines[i].includes('/') ? lines[i].split('/') : [lines[i], ''];
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${i}`;
        card.innerHTML = `
            <div class="card-title">${(name||'').trim().toUpperCase()} ${(number||'').trim() ? '#' + number.trim() : ''}</div>
            <div class="card-placeholder"><div class="spinner"></div></div>
        `;
        resultsEl.appendChild(card);
    }

    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('images', f));
    formData.append('flockages', lines.join('\n'));

    try {
        const res = await fetch('/generate_bulk', { method: 'POST', body: formData });
        if (!res.ok) {
            const errData = await res.json();
            statusEl.textContent = "Erreur: " + (errData.error || 'inconnue');
            generateBtn.disabled = false;
            generateBtn.textContent = "Lancer la génération";
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let done = 0;
        const total = selectedFiles.length;

        while (true) {
            const { value, done: streamDone } = await reader.read();
            if (streamDone) break;
            buffer += decoder.decode(value, { stream: true });
            let lines2 = buffer.split('\n');
            buffer = lines2.pop(); // garde la dernière ligne incomplète

            for (const line of lines2) {
                if (!line.trim()) continue;
                const data = JSON.parse(line);
                renderResult(data);
                done++;
                progressFill.style.width = `${Math.round(done / total * 100)}%`;
                statusEl.textContent = `${done} / ${total} traité(s)`;
            }
        }
    } catch (err) {
        statusEl.textContent = "Erreur: " + err.message;
    } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "Lancer la génération";
    }
});

function renderResult(data) {
    const card = document.getElementById(`card-${data.index}`);
    if (!card) return;

    if (data.image) {
        const imgSrc = `data:image/png;base64,${data.image}`;
        card.innerHTML = `
            <div class="card-title">${(data.name||'').toUpperCase()} ${data.number ? '#' + data.number : ''}</div>
            <img src="${imgSrc}" alt="result">
            <a class="download-btn" href="${imgSrc}" download="maillot_${(data.name||'jersey')}_${data.number||''}.png">Télécharger</a>
        `;
    } else {
        card.innerHTML = `
            <div class="card-title">${(data.name||'').toUpperCase()} ${data.number ? '#' + data.number : ''}</div>
            <div class="card-placeholder">❌ Échec</div>
            <div class="card-error">${data.error || 'Erreur inconnue'}</div>
        `;
    }
}
</script>
</body>
</html>
