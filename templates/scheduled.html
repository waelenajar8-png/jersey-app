<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikToks Programmés</title>
<style>
:root[data-theme="dark"]{--bg:#0f1115;--panel:#1a1d24;--border:#2a2e37;--accent:#4ade80;--text:#e5e7eb;--text-dim:#9ca3af;--danger:#f87171}
:root[data-theme="light"]{--bg:#f3f4f6;--panel:#fff;--border:#d1d5db;--accent:#16a34a;--text:#111827;--text-dim:#6b7280;--danger:#ef4444}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
.wrap{max-width:1400px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
h1{font-size:22px;margin:0}
.nav{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.nav a{color:var(--accent);text-decoration:none;font-size:13px;font-weight:600}
.theme-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);border-radius:100px;font-size:12px;font-weight:600;cursor:pointer}
.filter-btn.active{background:var(--accent);color:#0f1115;border-color:var(--accent)}
.count-badge{background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border)}
.card-num{font-size:13px;font-weight:700}
.card-meta{font-size:10px;color:var(--text-dim);margin-top:2px}
.images-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:6px}
.images-grid img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:3px}
.more{display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:3px;aspect-ratio:3/4;font-size:10px;color:var(--text-dim);font-weight:700}
.card-footer{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.account-tag{background:rgba(74,222,128,.1);color:var(--accent);padding:3px 8px;border-radius:100px;font-size:10px;font-weight:700}
.time-tag{font-size:11px;color:var(--text-dim)}
.empty{text-align:center;color:var(--text-dim);padding:60px;font-size:14px}
.loading{text-align:center;color:var(--text-dim);padding:60px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>✅ TikToks programmés</h1>
            <div style="color:var(--text-dim);font-size:12px;margin-top:4px">Tous les TikToks envoyés sur RobinReach</div>
        </div>
        <div class="nav">
            <a href="/">🎨 Générateur</a>
            <a href="/queue">📋 File d'attente</a>
            <a href="/dashboard">📊 Dashboard</a>
            <button class="theme-btn" id="themeBtn">☀️</button>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-card"><div class="stat-label">Total programmés</div><div class="stat-value" id="totalCount">—</div></div>
        <div class="stat-card"><div class="stat-label">Cette semaine</div><div class="stat-value" id="weekCount">—</div></div>
        <div class="stat-card"><div class="stat-label">Comptes actifs</div><div class="stat-value" id="accountCount">—</div></div>
    </div>

    <div class="filters" id="filters">
        <span class="count-badge" id="countBadge">⏳ Chargement...</span>
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tous</button>
    </div>

    <div id="grid" class="grid">
        <div class="loading"><div class="spinner"></div>Chargement...</div>
    </div>
</div>

<script>
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('theme') || 'dark';
applyTheme(theme);
function applyTheme(t){theme=t;html.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('theme',t)}
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

let tiktoks = [];
let currentFilter = 'all';

async function load() {
    const res = await fetch('/api/scheduled');
    const data = await res.json();
    tiktoks = data.tiktoks || [];
    updateStats();
    updateFilters();
    render();
}

function updateStats() {
    document.getElementById('totalCount').textContent = tiktoks.length;
    const now = new Date();
    const weekAgo = new Date(now - 7*24*60*60*1000);
    const weekCount = tiktoks.filter(t => new Date(t.scheduled_at) > weekAgo).length;
    document.getElementById('weekCount').textContent = weekCount;
    const accounts = new Set(tiktoks.map(t => t.account).filter(Boolean));
    document.getElementById('accountCount').textContent = accounts.size;
}

function updateFilters() {
    const accounts = [...new Set(tiktoks.map(t => t.account).filter(Boolean))];
    const filtersEl = document.getElementById('filters');
    const existingBtns = filtersEl.querySelectorAll('.filter-btn');
    existingBtns.forEach((btn, i) => { if (i > 0) btn.remove(); });
    accounts.forEach(acc => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (currentFilter === acc ? ' active' : '');
        btn.textContent = acc;
        btn.onclick = () => setFilter(acc, btn);
        filtersEl.appendChild(btn);
    });
}

function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
}

function render() {
    const grid = document.getElementById('grid');
    const countBadge = document.getElementById('countBadge');
    let filtered = currentFilter === 'all' ? tiktoks : tiktoks.filter(t => t.account === currentFilter);
    countBadge.textContent = `${filtered.length} TikTok(s)`;

    if (!filtered.length) {
        grid.innerHTML = '<div class="empty">📭 Aucun TikTok programmé<br><br><a href="/queue" style="color:var(--accent)">← File d\'attente</a></div>';
        return;
    }

    grid.innerHTML = filtered.map(t => {
        const imgs = t.image_urls || [];
        const displayImgs = imgs.slice(0, 4);
        const remaining = imgs.length - 4;
        const scheduledDate = new Date(t.scheduled_at);
        const dateStr = scheduledDate.toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'short'});
        const timeStr = scheduledDate.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

        return `<div class="card">
            <div class="card-header">
                <div class="card-num">TikTok ${t.number}</div>
                <div class="card-meta">Par ${t.user} · ${t.image_keys?.length || 0} images</div>
            </div>
            <div class="images-grid">
                ${displayImgs.map(url => `<img src="${url}" loading="lazy">`).join('')}
                ${remaining > 0 ? `<div class="more">+${remaining}</div>` : ''}
            </div>
            <div class="card-footer">
                <span class="account-tag">${t.account || '—'}</span>
                <span class="time-tag">${dateStr} ${timeStr}</span>
            </div>
        </div>`;
    }).join('');
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
