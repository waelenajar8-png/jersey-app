<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikToks Programmés</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
    --bg:#0a0b0f; --bg-elevated:#0f1117;
    --panel:#15171e; --panel-hover:#1a1d26;
    --border:#242832; --border-strong:#323847;
    --accent:#4ade80; --accent-grad:linear-gradient(135deg,#4ade80,#22d3ee); --accent-dim:rgba(74,222,128,.12);
    --text:#f1f3f6; --text-dim:#8b93a3; --text-faint:#5b6373;
    --danger:#f87171; --danger-dim:rgba(248,113,113,.12);
    --warn:#fbbf24; --warn-dim:rgba(251,191,36,.12);
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 4px 12px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.3);
    --shadow-lg:0 12px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3);
    --shadow-glow:0 0 0 1px rgba(74,222,128,.15),0 4px 16px rgba(74,222,128,.08);
}
:root[data-theme="light"]{
    --bg:#f7f8fa; --bg-elevated:#ffffff;
    --panel:#ffffff; --panel-hover:#f9fafb;
    --border:#e5e7eb; --border-strong:#d1d5db;
    --accent:#16a34a; --accent-grad:linear-gradient(135deg,#16a34a,#0891b2); --accent-dim:rgba(22,163,74,.08);
    --text:#0f172a; --text-dim:#64748b; --text-faint:#94a3b8;
    --danger:#dc2626; --danger-dim:rgba(220,38,38,.08);
    --warn:#d97706; --warn-dim:rgba(217,119,6,.08);
    --shadow-sm:0 1px 2px rgba(15,23,42,.06);
    --shadow-md:0 4px 12px rgba(15,23,42,.08),0 1px 3px rgba(15,23,42,.06);
    --shadow-lg:0 12px 32px rgba(15,23,42,.12),0 2px 8px rgba(15,23,42,.06);
    --shadow-glow:0 0 0 1px rgba(22,163,74,.12),0 4px 16px rgba(22,163,74,.06);
}
*{box-sizing:border-box}
::selection{background:var(--accent);color:#0a0b0f}
body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 24px;transition:background .25s ease,color .25s ease;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
.wrap{max-width:1400px;margin:0 auto}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.card{animation:fadeInUp .35s cubic-bezier(.16,1,.3,1) both}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
h1{font-size:24px;margin:0;font-weight:800;letter-spacing:-0.02em}
.nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
@media(max-width:640px){
    .topbar{flex-direction:column;align-items:stretch}
    .nav{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .nav::-webkit-scrollbar{display:none}
    .nav a,.theme-btn{flex-shrink:0}
}
.nav a{color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;transition:all .15s ease}
.nav a:hover{color:var(--text);background:var(--panel-hover)}
.theme-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:100px;cursor:pointer;font-size:13px;font-weight:600;box-shadow:var(--shadow-sm);transition:all .15s ease}
.theme-btn:hover{border-color:var(--border-strong);transform:translateY(-1px)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
@media(max-width:700px){.stats-bar{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);transition:transform .2s ease,box-shadow .2s ease}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:600}
.stat-value{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.btn{padding:11px 20px;background:var(--accent-grad);color:#06170d;border:none;border-radius:11px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:var(--shadow-glow);transition:all .18s cubic-bezier(.16,1,.3,1)}
.btn:hover:not(:disabled){transform:translateY(-1.5px);box-shadow:0 6px 20px rgba(74,222,128,.25),var(--shadow-glow)}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-danger{background:var(--danger-dim);border:1px solid rgba(248,113,113,.3);color:var(--danger);padding:9px 16px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s ease}
.btn-danger:hover{background:rgba(248,113,113,.2);transform:translateY(-1px)}
.btn-sec{padding:9px 16px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s ease}
.btn-sec:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s ease}
.filter-btn:hover{transform:translateY(-1px)}
.filter-btn.active{background:var(--accent-grad);color:#06170d;border-color:transparent}
.count-badge{background:var(--panel);border:1px solid var(--border);padding:8px 14px;border-radius:100px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow-sm)}
.status-bar{background:var(--accent-dim);border:1px solid rgba(74,222,128,.25);border-radius:12px;padding:13px 18px;margin-bottom:18px;font-size:13px;font-weight:500;display:none;transition:opacity .3s,transform .3s}
.status-bar.show{display:block;opacity:1;transform:translateY(0)}
.status-bar:not(.show){opacity:0;transform:translateY(-4px);pointer-events:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .18s cubic-bezier(.16,1,.3,1),box-shadow .18s ease,border-color .15s ease}
.card:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong);transform:translateY(-2px)}
.card-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-num{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-0.01em}
.card-meta{font-size:10.5px;color:var(--text-dim);margin-top:2px;font-weight:500}
.images-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:8px}
.images-grid img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:6px;background:var(--bg-elevated);cursor:zoom-in;transition:transform .25s ease}
.images-grid img:hover{transform:scale(1.05)}
.more{display:flex;align-items:center;justify-content:center;background:var(--bg-elevated);border-radius:6px;aspect-ratio:3/4;font-size:10px;color:var(--text-dim);font-weight:700}
.card-footer{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);flex-wrap:wrap;gap:6px}
.account-tag{background:var(--accent-dim);color:var(--accent);padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700}
.time-tag{font-size:11px;color:var(--text-dim);font-weight:500}
.unschedule-btn{padding:5px 10px;background:var(--warn-dim);border:1px solid rgba(251,191,36,.3);color:var(--warn);border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s ease}
.unschedule-btn:hover{background:rgba(251,191,36,.2);transform:translateY(-1px)}
.empty{text-align:center;color:var(--text-dim);padding:70px 20px;font-size:14px;font-weight:500}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
.checkbox{width:16px;height:16px;cursor:pointer;accent-color:var(--warn)}
.week-progress{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-sm)}
.week-track{flex:1;height:8px;background:var(--border);border-radius:100px;overflow:hidden}
.week-fill{height:100%;background:var(--accent-grad);border-radius:100px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.week-text{font-size:12px;color:var(--text-dim);white-space:nowrap;font-weight:500}
.pagination{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:24px}
.page-btn{padding:9px 16px;background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;transition:all .15s ease}
.page-btn:hover:not(:disabled){border-color:var(--border-strong);transform:translateY(-1px)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:13px;color:var(--text-dim);font-weight:500}
.lightbox-bg{position:fixed;inset:0;background:rgba(5,6,10,.92);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox-bg.open{display:flex}
.lightbox-bg img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:var(--shadow-lg)}
.lightbox-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;width:42px;height:42px;border-radius:50%;cursor:pointer;transition:background .15s}
.lightbox-close:hover{background:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>✅ TikToks programmés</h1>
            <div style="color:var(--text-dim);font-size:12px;margin-top:2px">Tous les TikToks envoyés sur RobinReach</div>
        </div>
        <div class="nav">
            <a href="/">🎨 Générateur</a>
            <a href="/queue">📋 File d'attente</a>
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/calendar">📅 Calendrier</a>
            <button class="theme-btn" onclick="exportPlanning()">📄 Export planning</button>
            <button class="theme-btn" id="themeBtn">☀️</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><div class="stat-label">Total programmés</div><div class="stat-value" id="totalCount">—</div></div>
        <div class="stat-card"><div class="stat-label">Cette semaine</div><div class="stat-value" id="weekCount">—</div></div>
        <div class="stat-card"><div class="stat-label">Comptes actifs</div><div class="stat-value" id="accountCount">—</div></div>
        <div class="stat-card"><div class="stat-label">Sélectionnés</div><div class="stat-value" id="selCount">0</div></div>
    </div>

    <div class="week-progress" id="weekProgress">
        <span style="font-size:12px;font-weight:600">📅 Semaine :</span>
        <div class="week-track"><div class="week-fill" id="weekFill"></div></div>
        <span class="week-text" id="weekText">—/28 TikToks</span>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="toolbar">
        <span class="count-badge" id="countBadge">⏳ Chargement...</span>
        <button class="btn-sec" onclick="selectAll()">☑️ Tout sélectionner (page)</button>
        <button class="btn-sec" id="deselectAllBtn" onclick="deselectAll()" style="display:none">✖️ Désélectionner</button>
        <button class="btn-danger" id="unscheduleSelBtn" onclick="unscheduleSelected()" style="display:none">↩️ Remettre en file d'attente</button>
        <button class="btn-sec" onclick="checkAllStatus()">🔍 Vérifier statuts RobinReach</button>
        <button class="btn-sec" style="background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.4);color:var(--warn)" onclick="findDuplicates()">⚠️ Détecter doublons</button>
        <button class="btn-danger" onclick="unscheduleAll()" style="margin-left:auto">↩️ Tout déprogrammer</button>
    </div>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Tous</button>
    </div>

    <div id="grid" class="grid">
        <div class="loading" style="grid-column:1/-1;text-align:center"><div class="spinner"></div>Chargement...</div>
    </div>

    <div class="pagination" id="pagination" style="display:none">
        <button class="page-btn" id="prevPageBtn" onclick="changePage(-1)">← Précédent</button>
        <span class="page-info" id="pageInfo">Page 1</span>
        <button class="page-btn" id="nextPageBtn" onclick="changePage(1)">Suivant →</button>
    </div>
</div>

<div class="lightbox-bg" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" onclick="event.stopPropagation()">
</div>

<script>
const html=document.documentElement;
const themeBtn=document.getElementById('themeBtn');
let theme=localStorage.getItem('theme')||'dark';
applyTheme(theme);
function applyTheme(t){theme=t;html.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('theme',t)}
themeBtn.addEventListener('click',()=>applyTheme(theme==='dark'?'light':'dark'));

let tiktoks=[];
let currentFilter='all';
let selected=new Set();
let currentPage=0;
let perPage=20;
let totalCount=0;

async function loadPage(page){
    currentPage=page;
    document.getElementById('grid').innerHTML='<div class="loading" style="grid-column:1/-1;text-align:center"><div class="spinner"></div>Chargement...</div>';
    const res=await fetch(`/api/scheduled?page=${page}&per_page=${perPage}`);
    const data=await res.json();
    tiktoks=data.tiktoks||[];
    totalCount=data.total||0;
    updateStats();
    updateFilters();
    render();
    updatePagination();
}

function updatePagination(){
    const totalPages=Math.max(1,Math.ceil(totalCount/perPage));
    document.getElementById('pagination').style.display=totalPages>1?'flex':'none';
    document.getElementById('pageInfo').textContent=`Page ${currentPage+1} / ${totalPages} (${totalCount} au total)`;
    document.getElementById('prevPageBtn').disabled=currentPage===0;
    document.getElementById('nextPageBtn').disabled=currentPage>=totalPages-1;
}
function changePage(delta){ loadPage(currentPage+delta); }

function updateStats(){
    document.getElementById('totalCount').textContent=totalCount;
    const now=new Date();
    const weekStart=new Date(now);
    weekStart.setDate(now.getDate()-now.getDay());
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);
    weekEnd.setDate(weekStart.getDate()+7);
    const weekItems=tiktoks.filter(t=>{
        const d=new Date(t.scheduled_at);
        return d>=weekStart&&d<weekEnd;
    });
    document.getElementById('weekCount').textContent=weekItems.length;
    document.getElementById('weekFill').style.width=`${Math.min(weekItems.length/28*100,100)}%`;
    document.getElementById('weekText').textContent=`${weekItems.length}/28 TikToks cette semaine (page actuelle)`;
    const accounts=new Set(tiktoks.map(t=>t.account).filter(Boolean));
    document.getElementById('accountCount').textContent=accounts.size;
}

function updateFilters(){
    const accounts=[...new Set(tiktoks.map(t=>t.account).filter(Boolean))];
    const filtersEl=document.getElementById('filters');
    const existingBtns=filtersEl.querySelectorAll('.filter-btn');
    existingBtns.forEach((btn,i)=>{if(i>0)btn.remove()});
    accounts.forEach(acc=>{
        const btn=document.createElement('button');
        btn.className='filter-btn'+(currentFilter===acc?' active':'');
        btn.textContent=acc;
        btn.onclick=()=>setFilter(acc,btn);
        filtersEl.appendChild(btn);
    });
}

function setFilter(filter,el){
    currentFilter=filter;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    render();
}

function render(){
    const grid=document.getElementById('grid');
    const countBadge=document.getElementById('countBadge');
    const unscheduleSelBtn=document.getElementById('unscheduleSelBtn');
    const deselectAllBtn=document.getElementById('deselectAllBtn');
    const selCountEl=document.getElementById('selCount');

    let filtered=currentFilter==='all'?tiktoks:tiktoks.filter(t=>t.account===currentFilter);
    countBadge.textContent=`${filtered.length} TikTok(s) affichés (page)`;
    selCountEl.textContent=selected.size;
    unscheduleSelBtn.style.display=selected.size>0?'inline-block':'none';
    deselectAllBtn.style.display=selected.size>0?'inline-block':'none';

    if(!filtered.length){
        grid.innerHTML='<div class="empty" style="grid-column:1/-1">📭 Aucun TikTok programmé<br><br><a href="/queue" style="color:var(--accent)">← File d\'attente</a></div>';
        return;
    }

    grid.innerHTML=filtered.map(t=>{
        const imgs=t.image_urls||[];
        const show=imgs.slice(0,1);
        const total=t.image_keys?.length||imgs.length;
        const rem=total-1;
        const scheduledDate=new Date(t.scheduled_at);
        const dateStr=scheduledDate.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'});
        const timeStr=scheduledDate.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        const isSel=selected.has(t.r2_key);

        return `<div class="card" id="scard-${t.id}">
            <div class="card-header">
                <div>
                    <div class="card-num">
                        <input type="checkbox" class="checkbox" ${isSel?'checked':''} onchange="toggleSelect('${t.r2_key}')">
                        TikTok ${t.number} <span style="font-size:10px;color:var(--text-dim)">${t.image_keys?.length||0} img</span>
                    </div>
                    <div class="card-meta">${t.user} ${t.real_status?`· <span style="color:${t.real_status==='published'||t.real_status==='posted'?'var(--accent)':t.real_status==='failed'?'var(--danger)':'var(--warn)'}">${t.real_status}</span>`:''}</div>
                </div>
            </div>
            <div class="images-grid">
                ${show.map(u=>`<img src="${u||''}" loading="lazy" onerror="this.style.opacity='.15'" onclick="openLightbox('${u}')">`).join('')}
                ${rem>0?`<div class="more">+${rem} imgs</div>`:''}
            </div>
            <div class="card-footer">
                <span class="account-tag">${t.account||'—'}</span>
                <span class="time-tag">${dateStr} ${timeStr}</span>
                <button class="unschedule-btn" onclick="unscheduleSingle('${t.r2_key}')">↩️ Déprogrammer</button>
            </div>
        </div>`;
    }).join('');
}

function openLightbox(url){
    if(!url) return;
    document.getElementById('lightboxImg').src=url;
    document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

function toggleSelect(key){
    if(selected.has(key)) selected.delete(key);
    else selected.add(key);
    render();
}

function selectAll(){
    let filtered=currentFilter==='all'?tiktoks:tiktoks.filter(t=>t.account===currentFilter);
    filtered.forEach(t=>selected.add(t.r2_key));
    render();
}

function deselectAll(){
    selected.clear();
    render();
}

async function unscheduleSingle(key){
    if(!confirm('Remettre ce TikTok en file d\'attente ? (déprogrammé aussi sur RobinReach)')) return;
    showStatus('⏳ Déprogrammation en cours...');
    // Retirer la carte instantanément
    const t=tiktoks.find(t=>t.r2_key===key);
    if(t){
        const card=document.getElementById(`scard-${t.id}`);
        if(card){card.style.opacity='0.3';card.style.pointerEvents='none';}
    }
    try{
        const res=await fetch('/api/scheduled/unschedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys:[key]})});
        if(!res.ok){
            if(t){const card=document.getElementById(`scard-${t.id}`);if(card){card.style.opacity='1';card.style.pointerEvents='auto';}}
            showStatus(`❌ Erreur serveur (${res.status}) — réessaie`);return
        }
        const d=await res.json();
        tiktoks=tiktoks.filter(t=>t.r2_key!==key);
        selected.delete(key);
        totalCount=Math.max(0,totalCount-1);
        showStatus(`✅ ${d.count} TikTok(s) remis en file d'attente`);
        updateStats();
        render();
        updatePagination();
    }catch(e){
        if(t){const card=document.getElementById(`scard-${t.id}`);if(card){card.style.opacity='1';card.style.pointerEvents='auto';}}
        showStatus(`❌ Erreur réseau : ${e.message} — vérifie et réessaie`);
    }
}

async function unscheduleSelected(){
    if(!selected.size){alert('Aucun TikTok sélectionné');return}
    if(!confirm(`Remettre ${selected.size} TikTok(s) en file d'attente ? (déprogrammés aussi sur RobinReach)`)) return;
    const btn=document.getElementById('unscheduleSelBtn');
    btn.disabled=true;
    const keys=[...selected];
    const total=keys.length;
    let done=0;
    // Déprogrammer un par un avec feedback en temps réel
    for(const key of keys){
        showStatus(`⏳ Déprogrammation ${done+1}/${total}...`);
        const t=tiktoks.find(t=>t.r2_key===key);
        if(t){const card=document.getElementById(`scard-${t.id}`);if(card){card.style.opacity='0.3';card.style.pointerEvents='none';}}
        try{
            const res=await fetch('/api/scheduled/unschedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys:[key]})});
            if(res.ok){
                tiktoks=tiktoks.filter(t=>t.r2_key!==key);
                totalCount=Math.max(0,totalCount-1);
                selected.delete(key);
            }
        }catch(e){}
        done++;
        render();
    }
    btn.disabled=false;
    updateStats();
    updatePagination();
    showStatus(`✅ ${done} TikTok(s) remis en file d'attente`);
}

async function unscheduleAll(){
    if(!confirm(`Déprogrammer TOUS les TikToks de cette page (${tiktoks.length}) et les remettre en file d'attente ?`)) return;
    showStatus(`⏳ Déprogrammation de ${tiktoks.length} TikTok(s) en cours... (peut prendre du temps)`);
    const allKeys=tiktoks.map(t=>t.r2_key);
    try{
        const res=await fetch('/api/scheduled/unschedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys:allKeys})});
        if(!res.ok){showStatus(`❌ Erreur serveur (${res.status}) — réessaie`);return}
        const d=await res.json();
        showStatus(`✅ ${d.count} TikTok(s) remis en file d'attente`);
        selected.clear();
        await loadPage(currentPage);
    }catch(e){
        showStatus(`❌ Erreur réseau : ${e.message} — vérifie ta connexion et réessaie`);
    }
}

async function checkAllStatus(){
    if(!tiktoks.length){alert('Aucun TikTok à vérifier.');return}
    showStatus(`🔍 Vérification des statuts de ${tiktoks.length} TikTok(s)...`);
    const keys = tiktoks.map(t=>t.r2_key);
    const res = await fetch('/api/scheduled/check_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keys})});
    const d = await res.json();
    if(d.error){ showStatus(`❌ ${d.error}`); return }
    // Mettre à jour localement
    Object.entries(d.results).forEach(([key,info])=>{
        const t = tiktoks.find(t=>t.r2_key===key);
        if(t) t.real_status = info.status;
    });
    render();
    showStatus(`✅ Statuts vérifiés pour ${tiktoks.length} TikTok(s)`);
}

async function findDuplicates(){
    showStatus('🔍 Recherche de doublons en cours...');
    const res = await fetch('/api/scheduled/find_duplicates');
    const d = await res.json();
    if(!d.count){
        alert('✅ Aucun doublon trouvé — tous les créneaux sont uniques.');
        showStatus('✅ Aucun doublon');
        return;
    }
    let msg = `⚠️ ${d.count} conflit(s) de créneau trouvé(s) :\n\n`;
    d.duplicates.forEach(dup=>{
        const date = new Date(dup.scheduled_at);
        const timeStr = date.toLocaleDateString('fr-FR')+' '+date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
        msg += `Compte ${dup.account} — ${timeStr} :\n`;
        dup.tiktoks.forEach(t=>{ msg += `  • TikTok ${t.number}\n`; });
        msg += '\n';
    });
    msg += 'Va sur RobinReach pour vérifier et supprimer les doublons manuellement, ou utilise "Déprogrammer" sur les TikToks en trop ci-dessous.';
    alert(msg);
    showStatus(`⚠️ ${d.count} conflit(s) trouvé(s) — voir le détail`);
}

function exportPlanning(){
    let text = `📅 PLANNING TIKTOK — Export du ${new Date().toLocaleDateString('fr-FR')}\n\n`;
    const sorted = [...tiktoks].sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
    sorted.forEach(t=>{
        const d = new Date(t.scheduled_at);
        text += `TikTok ${t.number} — ${t.account} — ${d.toLocaleDateString('fr-FR')} ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}\n`;
    });
    const blob = new Blob([text], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `planning_tiktok_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}

let statusHideTimer=null;
function showStatus(msg){
    const bar=document.getElementById('statusBar');
    bar.textContent=msg;bar.classList.add('show');
    if(statusHideTimer) clearTimeout(statusHideTimer);
    statusHideTimer=setTimeout(()=>bar.classList.remove('show'),5000);
}

loadPage(0);
</script>
